name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    # -----------------------
    # Backend Setup
    # -----------------------
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install

    # -----------------------
    # AI Service Setup
    # -----------------------
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install AI Dependencies
      run: |
        cd ai-service
        pip install -r requirements.txt

    # -----------------------
    # Docker Build Test
    # -----------------------
    - name: Build Backend Docker Image
      run: docker build -t backend-app ./backend

    - name: Build AI Docker Image
      run: docker build -t ai-service ./ai-service